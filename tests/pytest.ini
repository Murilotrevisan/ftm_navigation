# pytest configuration for the host-side test levels (L3, L4, L5, Lsim).
#
# Invoked from the repository root, so paths below are repo-relative:
#     .\tools\dev.ps1 e2e | manual | tools-test
#
# L1a and L1b are NOT pytest -- they are Ceedling and the ESP-IDF linux target,
# and they run in the container (docs/TESTING.md §1).
[pytest]
# rootdir is tests/ (this file's directory), so these are relative to it.
testpaths = e2e tools manual sim
norecursedirs = host_ceedling host_idf target_smoke build build_container

markers =
    e2e: L3 -- runs against both boards, autonomous, needs hardware
    manual: L5 -- operator-driven; excluded from the autonomous run by default
    slow: takes more than ~30 s
    sim: Lsim -- simulation, no hardware

# `-m "not manual"` is the autonomous selection. It is NOT the default here,
# because the default must stay honest: a bare `pytest` should run everything
# it can see rather than silently hiding a level.
#
# --import-mode=importlib: e2e/ and tools/ both contain a
# test_harness_smoke.py, and under the legacy import mode two test files
# sharing a basename collide during collection unless every directory is made
# a package. importlib mode imports each file by path instead.
addopts = -ra --strict-markers --import-mode=importlib
